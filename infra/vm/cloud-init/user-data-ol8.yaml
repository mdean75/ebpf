#cloud-config

# Oracle Linux 8 cloud-init bootstrap for service-b VMs (RHCK kernel).
# After packages install, the RHCK kernel is set as the grub default and the
# VM reboots once so subsequent runs use the Red Hat Compatible Kernel (not UEK).
# Binaries and TLS certs are deployed separately via make deploy-b.

users:
  - name: cloud-user
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - EBPF_SSH_PUBKEY

chpasswd:
  list: |
    cloud-user:cloud-user
  expire: false

ssh_pwauth: true

package_update: true
package_upgrade: false
packages:
  - qemu-guest-agent

write_files:
  # nginx stream proxy config (L4 TLS → service-b plain TCP)
  - path: /etc/nginx/nginx.conf
    owner: root:root
    permissions: "0644"
    content: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log;
      pid /run/nginx.pid;
      include /usr/share/nginx/modules/*.conf;

      events {
          worker_connections 1024;
      }

      stream {
          upstream service_b {
              server 127.0.0.1:50051;
          }

          server {
              listen 443 ssl;

              ssl_certificate     /etc/nginx/certs/server.crt;
              ssl_certificate_key /etc/nginx/certs/server.key;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_session_cache   shared:SSL:10m;
              ssl_session_timeout 10m;

              proxy_pass            service_b;
              proxy_timeout         3600s;
              proxy_connect_timeout 5s;
          }
      }

  # TLS certificate — replace with per-VM cert generated by gen-certs.sh.
  # These placeholders are overwritten by provision-ol8.sh via scp before VM boots.
  - path: /etc/nginx/certs/server.crt
    owner: root:root
    permissions: "0644"
    content: "PLACEHOLDER — replaced by provision-ol8.sh"

  - path: /etc/nginx/certs/server.key
    owner: root:root
    permissions: "0600"
    content: "PLACEHOLDER — replaced by provision-ol8.sh"

  # service-b systemd unit
  - path: /etc/systemd/system/service-b.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=service-b gRPC server
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/service-b
      Restart=always
      RestartSec=2s
      Environment=GRPC_PORT=50051
      Environment=HEALTH_PORT=8080
      Environment=PROCESSING_DELAY=1ms

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Install nginx via the appstream module stream.
  # Must be done in runcmd (not packages:) so the module can be enabled first.
  - dnf module enable nginx:1.20 -y
  - dnf install -y nginx

  # Create cert directory owned by cloud-user so scp works without sudo.
  - mkdir -p /etc/nginx/certs
  - chown cloud-user:cloud-user /etc/nginx/certs

  # Firewall: open required ports before reloading firewalld.
  # SSH (port 22) is already open in the default public zone on OL8 cloud images.
  - firewall-cmd --permanent --add-port=443/tcp
  - firewall-cmd --permanent --add-port=8080/tcp
  - firewall-cmd --reload

  # Enable units (started after certs and binary are deployed).
  - systemctl enable nginx
  - systemctl enable service-b

  # --- Switch from UEK to RHCK ---
  # Install the Red Hat Compatible Kernel (package name: kernel).
  # The UEK is kernel-uek; both coexist after this step.
  - dnf install -y kernel

  # Regenerate the RHCK initramfs with --host-only so dracut introspects the
  # running system and includes LVM/device-mapper modules for vg_main/lv_root.
  # Without this the RPM post-install dracut run occurs before udev fully
  # enumerates block devices, producing a generic initramfs that can't find
  # the LVM root — resulting in dracut emergency mode at boot.
  - |
    NEW_KVER=$(rpm -q kernel --qf '%{VERSION}-%{RELEASE}.%{ARCH}\n' | sort -V | tail -1)
    dracut --host-only --force "/boot/initramfs-${NEW_KVER}.img" "${NEW_KVER}"
    echo "initramfs regenerated for RHCK ${NEW_KVER}"

  # Set the newly installed RHCK vmlinuz as the grub default.
  # Sort by ctime and pick the newest non-uek entry.
  - |
    RHCK_VMLINUZ=$(ls -ct /boot/vmlinuz-* 2>/dev/null | grep -v uek | head -1)
    if [[ -n "${RHCK_VMLINUZ}" ]]; then
      grubby --set-default "${RHCK_VMLINUZ}"
      echo "RHCK default set to: ${RHCK_VMLINUZ}"
    else
      echo "WARNING: no non-uek vmlinuz found under /boot — grub default unchanged"
    fi

# Reboot once so the VM comes up on the RHCK kernel.
power_state:
  mode: reboot
  message: "Rebooting to activate RHCK kernel"
  timeout: 30
  condition: true
