#cloud-config

# Ubuntu 22.04 cloud-init bootstrap for service-b VMs.
# This user-data is rendered as a template — replace {{VM_NAME}} and {{VM_IP}}
# before use, or rely on DHCP + static leases.

# Allow console and SSH login with ubuntu/ubuntu.
# Change the password or switch to ssh_authorized_keys for anything beyond a lab.
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false

chpasswd:
  list: |
    ubuntu:ubuntu
  expire: false

ssh_pwauth: true

package_update: true
package_upgrade: false
packages:
  - nginx
  - ufw
  - qemu-guest-agent

write_files:
  # nginx stream proxy config (L4 TLS → service-b plain TCP)
  - path: /etc/nginx/nginx.conf
    owner: root:root
    permissions: "0644"
    content: |
      user www-data;
      worker_processes auto;
      pid /run/nginx.pid;
      include /etc/nginx/modules-enabled/*.conf;

      events {
          worker_connections 1024;
      }

      stream {
          upstream service_b {
              server 127.0.0.1:50051;
          }

          server {
              listen 443 ssl;

              ssl_certificate     /etc/nginx/certs/server.crt;
              ssl_certificate_key /etc/nginx/certs/server.key;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_session_cache   shared:SSL:10m;
              ssl_session_timeout 10m;

              proxy_pass            service_b;
              proxy_timeout         3600s;
              proxy_connect_timeout 5s;
          }
      }

  # TLS certificate — replace with per-VM cert generated by gen-certs.sh
  # These placeholders are overwritten by provision.sh via scp before VM boots.
  - path: /etc/nginx/certs/server.crt
    owner: root:root
    permissions: "0644"
    content: "PLACEHOLDER — replaced by provision.sh"

  - path: /etc/nginx/certs/server.key
    owner: root:root
    permissions: "0600"
    content: "PLACEHOLDER — replaced by provision.sh"

  # service-b systemd unit
  - path: /etc/systemd/system/service-b.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=service-b gRPC server
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/service-b
      Restart=always
      RestartSec=2s
      Environment=GRPC_PORT=50051
      Environment=HEALTH_PORT=8080
      Environment=PROCESSING_DELAY=1ms

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Create cert directory, owned by ubuntu so scp works without sudo
  - mkdir -p /etc/nginx/certs
  - chown ubuntu:ubuntu /etc/nginx/certs

  # Open SSH before enabling ufw — without this, enabling ufw drops port 22
  # and all subsequent SSH/SCP connections hang indefinitely.
  - ufw allow OpenSSH
  - ufw allow 443/tcp
  - ufw allow 8080/tcp
  - ufw --force enable

  # Enable and start nginx (cert placeholders will cause failure until
  # real certs are deployed by provision.sh — nginx is restarted after scp)
  - systemctl enable nginx
  - systemctl enable service-b

  # service-b binary is deployed separately via make deploy-b
  # nginx is started after certs are in place (provision.sh restarts it)
