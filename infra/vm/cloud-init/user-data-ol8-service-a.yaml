#cloud-config

# Oracle Linux 8 cloud-init bootstrap for VM 0 (service-a + ebpf-agent, RHCK kernel).
# No nginx, no service-b. Binaries are deployed separately via:
#   make deploy-a VM_A=<ip>
#   make deploy-agent VM_A=<ip>

users:
  - name: cloud-user
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - EBPF_SSH_PUBKEY

chpasswd:
  list: |
    cloud-user:cloud-user
  expire: false

ssh_pwauth: true

package_update: true
package_upgrade: false
packages:
  - qemu-guest-agent

write_files:
  # service-a systemd unit
  - path: /etc/systemd/system/service-a.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=service-a gRPC load-balanced client
      After=network.target ebpf-agent.service
      Wants=ebpf-agent.service

      [Service]
      ExecStart=/usr/local/bin/service-a
      Restart=always
      RestartSec=2s
      # Configure via environment or override file:
      #   /etc/systemd/system/service-a.service.d/override.conf
      Environment=LB_MODE=ebpf
      Environment=MESSAGES_PER_SECOND=200
      Environment=HEARTBEAT_INTERVAL=500ms
      Environment=HEARTBEAT_TIMEOUT=2s
      Environment=EBPF_AGENT_ADDR=localhost:9090
      # VM_ADDRESSES and TLS_CA_CERT set in override or export before starting

      [Install]
      WantedBy=multi-user.target

  # ebpf-agent systemd unit (requires root for BPF)
  - path: /etc/systemd/system/ebpf-agent.service
    owner: root:root
    permissions: "0644"
    content: |
      [Unit]
      Description=eBPF stream health agent
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/ebpf-agent
      Restart=always
      RestartSec=2s
      User=root
      Environment=TARGET_PORT=443
      Environment=RTT_MULTIPLIER=3
      Environment=CGROUP_PATH=/sys/fs/cgroup

      [Install]
      WantedBy=multi-user.target

  # Placeholder for CA cert — deployed by provision-ol8.sh after gen-certs.sh
  - path: /etc/service-a/ca.crt
    owner: root:root
    permissions: "0644"
    content: "PLACEHOLDER — replaced by provision-ol8.sh after certs/gen-certs.sh"

runcmd:
  # Create directories for binaries and certs.
  # /etc/service-a is owned by cloud-user so scp works without sudo.
  - mkdir -p /usr/local/bin /etc/service-a
  - chown cloud-user:cloud-user /etc/service-a

  # Firewall: open required ports.
  # SSH (port 22) is already open in the default public zone on OL8 cloud images.
  - firewall-cmd --permanent --add-port=2112/tcp   # service-a Prometheus
  - firewall-cmd --permanent --add-port=9090/tcp   # ebpf-agent signal API
  - firewall-cmd --permanent --add-port=9091/tcp   # ebpf-agent Prometheus
  - firewall-cmd --reload

  # Enable units (they will start once binaries are deployed).
  - systemctl enable ebpf-agent
  - systemctl enable service-a

  # --- Switch from UEK to RHCK ---
  # Install the Red Hat Compatible Kernel (package name: kernel).
  # The UEK is kernel-uek; both coexist after this step.
  - dnf install -y kernel

  # Regenerate the RHCK initramfs with --host-only so dracut introspects the
  # running system and includes LVM/device-mapper modules for vg_main/lv_root.
  # Without this the RPM post-install dracut run occurs before udev fully
  # enumerates block devices, producing a generic initramfs that can't find
  # the LVM root — resulting in dracut emergency mode at boot.
  - |
    NEW_KVER=$(rpm -q kernel --qf '%{VERSION}-%{RELEASE}.%{ARCH}\n' | sort -V | tail -1)
    dracut --host-only --force "/boot/initramfs-${NEW_KVER}.img" "${NEW_KVER}"
    echo "initramfs regenerated for RHCK ${NEW_KVER}"

  # Set the newly installed RHCK vmlinuz as the grub default.
  - |
    RHCK_VMLINUZ=$(ls -ct /boot/vmlinuz-* 2>/dev/null | grep -v uek | head -1)
    if [[ -n "${RHCK_VMLINUZ}" ]]; then
      grubby --set-default "${RHCK_VMLINUZ}"
      echo "RHCK default set to: ${RHCK_VMLINUZ}"
    else
      echo "WARNING: no non-uek vmlinuz found under /boot — grub default unchanged"
    fi

# Reboot once so the VM comes up on the RHCK kernel.
power_state:
  mode: reboot
  message: "Rebooting to activate RHCK kernel"
  timeout: 30
  condition: true
